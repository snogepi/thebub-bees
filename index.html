<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Bub-bees!</title>
    <link rel="icon" type="image/png" href="https://img.icons8.com/?size=100&id=kHIo1HoMapnX&format=png&color=000000">
    <link href="style.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <h1>The Bub-bees</h1>
        <div class="scroll-hint">Scroll! ➔</div>
    </header>

    <main class="stage-container">
        
        <svg class="svg-container" viewBox="0 0 1000 600" preserveAspectRatio="none">
            <defs>
                <mask id="mask-page-0">
                    <path id="path-page-0-mask" fill="none" stroke="white" stroke-width="10" stroke-linecap="round" d="M -50 350 C 150 200, 200 500, 400 350 C 450 300, 550 200, 500 350 C 450 480, 380 320, 520 280 C 650 250, 700 450, 1050 350" />
                </mask>
                <mask id="mask-page-1">
                    <path id="path-page-1-mask" fill="none" stroke="white" stroke-width="10" stroke-linecap="round" d="M -50 350 C 100 350, 150 200, 300 300 C 400 400, 500 450, 550 300 C 600 150, 450 150, 500 320 C 550 480, 750 350, 1050 350" />
                </mask>
                <mask id="mask-page-2">
                    <path id="path-page-2-mask" fill="none" stroke="white" stroke-width="10" stroke-linecap="round" d="M -50 350 C 200 200, 250 150, 350 350 C 420 500, 580 500, 650 350 C 720 200, 850 350, 1050 350" />
                </mask>
                <mask id="mask-page-3">
                    <path id="path-page-3-mask" fill="none" stroke="white" stroke-width="10" stroke-linecap="round" d="M -50 350 C 150 500, 250 500, 350 350 C 450 200, 400 200, 500 350 C 600 500, 750 150, 1050 350" />
                </mask>
                <mask id="mask-page-4">
                    <path id="path-page-4-mask" fill="none" stroke="white" stroke-width="10" stroke-linecap="round" d="M -50 350 C 100 150, 200 450, 400 450 C 550 450, 500 150, 650 150 C 800 150, 850 450, 1050 350" />
                </mask>
            </defs>

            <path id="path-page-0-visual" class="flight-path-visual" mask="url(#mask-page-0)" d="M -50 350 C 150 200, 200 500, 400 350 C 450 300, 550 200, 500 350 C 450 480, 380 320, 520 280 C 650 250, 700 450, 1050 350" />
            
            <path id="path-page-1-visual" class="flight-path-visual" mask="url(#mask-page-1)" d="M -50 350 C 100 350, 150 200, 300 300 C 400 400, 500 450, 550 300 C 600 150, 450 150, 500 320 C 550 480, 750 350, 1050 350" />

            <path id="path-page-2-visual" class="flight-path-visual" mask="url(#mask-page-2)" d="M -50 350 C 200 200, 250 150, 350 350 C 420 500, 580 500, 650 350 C 720 200, 850 350, 1050 350" />

            <path id="path-page-3-visual" class="flight-path-visual" mask="url(#mask-page-3)" d="M -50 350 C 150 500, 250 500, 350 350 C 450 200, 400 200, 500 350 C 600 500, 750 150, 1050 350" />

            <path id="path-page-4-visual" class="flight-path-visual" mask="url(#mask-page-4)" d="M -50 350 C 100 150, 200 450, 400 450 C 550 450, 500 150, 650 150 C 800 150, 850 450, 1050 350" />
        </svg>

        <div id="milestones-layer"></div>

        <div class="bee-container" id="bee">
            <div class="bee-wing wing-left"></div>
            <div class="bee-wing wing-right"></div>
            <div class="bee-body"></div>
        </div>

        <button class="interaction-btn" id="actionBtn">Smell the flowers?</button>
    </main>

    <div class="memory-modal" id="memory">
        <button class="close-btn" onclick="closeMemory()">X</button>
        <div class="memory-image" id="mem-img"></div>
        <div class="memory-date" id="mem-date"></div>
        <div class="memory-text" id="mem-desc"></div>
    </div>

    <div class="scroll-spacer"></div>

    <script src="script.js"></script>
</body>
</html>
